<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OVK Luftflödesprotokoll</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root{
      --orange:#F28C28;
      --light-orange:#FFD199;
      --soft-bg:#FFF6ED;
      --text:#1f2933;
      --white:#ffffff;
      --line:#ead8c5;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:20px;
      font-family:Arial, sans-serif;
      background:var(--soft-bg);
      color:var(--text);
    }

    .container{
      max-width:1800px;
      margin:0 auto;
    }

    .title-input{
      width:100%;
      text-align:center;
      font-size:28px;
      font-weight:700;
      padding:16px;
      border-radius:14px;
      border:2px solid var(--light-orange);
      background:var(--white);
      margin-bottom:20px;
    }

    .stats{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .stat{
      background:var(--white);
      padding:16px;
      border-radius:12px;
      border:2px solid var(--light-orange);
      min-width:180px;
    }

    .stat-label{
      font-size:13px;
      color:#666;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:26px;
      font-weight:700;
    }

    .table-wrap{
      background:var(--white);
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
      overflow:auto;
    }

    table{
      width:100%;
      min-width:1200px;
      border-collapse:collapse;
    }

    thead th{
      background:var(--orange);
      color:var(--white);
      padding:12px;
      font-weight:700;
      position:sticky;
      top:0;
      z-index:2;
      border:1px solid var(--orange);
      white-space:nowrap;
    }

    td{
      border:1px solid #eee;
      padding:8px;
      background:#fff;
    }

    td.apartment-cell{
      background:#FFF6ED;
      font-weight:700;
      min-width:120px;
    }

    td.note-cell{
      min-width:220px;
    }

    input.cell-input{
      width:100%;
      border:1px solid #ddd;
      border-radius:6px;
      padding:8px;
      font-size:14px;
      background:#fff;
    }

    .buttons{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    button{
      padding:12px 18px;
      border-radius:10px;
      cursor:pointer;
      font-size:15px;
    }

    .btn{
      border:2px solid var(--light-orange);
      background:#fff;
      color:var(--text);
      font-weight:600;
    }

    .btn-primary{
      border:none;
      background:var(--orange);
      color:#fff;
      font-weight:700;
    }

    .footer-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
      gap:20px;
      margin-top:30px;
    }

    .footer-box{
      background:var(--white);
      padding:20px;
      border-radius:16px;
      border:2px solid var(--light-orange);
    }

    .footer-box label{
      display:block;
      font-weight:700;
      margin-bottom:10px;
      color:var(--orange);
    }

    .footer-box input{
      width:100%;
      border:1px solid #ddd;
      border-radius:6px;
      padding:10px;
      font-size:14px;
    }

    @media (max-width:700px){
      body{ padding:12px; }
      .title-input{ font-size:22px; }
      .stat{ min-width:140px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <input
      id="projectTitle"
      class="title-input"
      value="Luftflödesprotokoll Brf Doktorn, Smidesvägen 17 Södertälje"
    />

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Rader</div>
        <div class="stat-value" id="statRows">32</div>
      </div>
      <div class="stat">
        <div class="stat-label">Kolumner</div>
        <div class="stat-value" id="statCols">6</div>
      </div>
      <div class="stat">
        <div class="stat-label">Ifyllda celler</div>
        <div class="stat-value" id="statFilled">0</div>
      </div>
    </div>

    <div class="table-wrap">
      <table id="ovkTable">
        <thead>
          <tr>
            <th>Lägenhet</th>
            <th>Kök</th>
            <th>Bad</th>
            <th>WC</th>
            <th>Vardagsrum</th>
            <th>Sov 1</th>
            <th>Sov 2</th>
            <th>Notering</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="buttons">
      <button class="btn" onclick="addRow()">Lägg till rad</button>
      <button class="btn" onclick="removeRow()">Ta bort rad</button>
      <button class="btn-primary" onclick="exportPDF()">Exportera PDF</button>
    </div>

    <div class="footer-grid">
      <div class="footer-box">
        <label for="dateField">Datum</label>
        <input type="date" id="dateField" />
      </div>
      <div class="footer-box">
        <label for="methodField">Mätmetod / kalibreringsnummer</label>
        <input type="text" id="methodField" placeholder="Ange metod och kal.nr" />
      </div>
      <div class="footer-box">
        <label for="performedByField">Utfört av</label>
        <input type="text" id="performedByField" placeholder="Namn" />
      </div>
    </div>

  </div>

  <script>
    const roomColumns = ["Kök", "Bad", "WC", "Vardagsrum", "Sov 1", "Sov 2"];
    const tbody = document.querySelector("#ovkTable tbody");

    function makeApartmentLabel(n){
      const floor = 11 + Math.floor((n - 1) / 3);
      const door = ((n - 1) % 3) + 1;
      return `${floor}0${door}`;
    }

    function createRow(apartmentLabel){
      const tr = document.createElement("tr");

      let html = `
        <td class="apartment-cell"><input class="cell-input" value="${apartmentLabel}"></td>
      `;

      for(let i = 0; i < roomColumns.length; i++){
        html += `<td><input class="cell-input"></td>`;
      }

      html += `<td class="note-cell"><input class="cell-input"></td>`;
      tr.innerHTML = html;
      tbody.appendChild(tr);
    }

    function buildInitialRows(){
      tbody.innerHTML = "";
      for(let i = 1; i <= 32; i++){
        createRow(makeApartmentLabel(i));
      }
      updateStats();
      attachInputListeners();
    }

    function addRow(){
      createRow(makeApartmentLabel(tbody.querySelectorAll("tr").length + 1));
      updateStats();
      attachInputListeners();
    }

    function removeRow(){
      const rows = tbody.querySelectorAll("tr");
      if(rows.length > 1){
        rows[rows.length - 1].remove();
        updateStats();
      }
    }

    function updateStats(){
      document.getElementById("statRows").textContent = tbody.querySelectorAll("tr").length;
      document.getElementById("statCols").textContent = roomColumns.length;
      updateFilledCount();
    }

    function updateFilledCount(){
      const inputs = tbody.querySelectorAll("input");
      let filled = 0;
      inputs.forEach(input => {
        if(input.value.trim() !== "") filled++;
      });
      document.getElementById("statFilled").textContent = filled;
    }

    function attachInputListeners(){
      tbody.querySelectorAll("input").forEach(input => {
        input.oninput = updateFilledCount;
      });
    }

    function sanitizeFileName(name){
      return (name || "OVK-projekt")
        .replace(/[\\\\/:*?\"<>|]/g, "-")
        .replace(/\\s+/g, " ")
        .trim();
    }

    function exportPDF(){
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF("landscape");

      const projectTitle = document.getElementById("projectTitle").value || "Luftflödesprotokoll";
      const date = document.getElementById("dateField").value || "";
      const method = document.getElementById("methodField").value || "";
      const performedBy = document.getElementById("performedByField").value || "";

      doc.setFillColor(242, 140, 40);
      doc.rect(8, 8, 281, 14, "F");

      doc.setTextColor(255,255,255);
      doc.setFontSize(14);
      doc.text(projectTitle, 148, 17, { align: "center" });

      doc.setTextColor(20);

      const body = [];
      tbody.querySelectorAll("tr").forEach(tr => {
        const row = [];
        tr.querySelectorAll("input").forEach(input => {
          row.push(input.value || "");
        });
        body.push(row);
      });

      doc.autoTable({
        startY: 28,
        head: [["Lägenhet", ...roomColumns, "Notering"]],
        body: body,
        headStyles: { fillColor: [242, 140, 40] },
        alternateRowStyles: { fillColor: [255, 244, 230] },
        styles: { fontSize: 8 }
      });

      doc.setFontSize(10);
      doc.text("Datum:", 20, 190);
      doc.text(date, 20, 197);

      doc.text("Mätmetod / kal.nr:", 120, 190);
      doc.text(method, 120, 197);

      doc.text("Utfört av:", 220, 190);
      doc.text(performedBy, 220, 197);

      doc.save(`${sanitizeFileName(projectTitle)}.pdf`);
    }

    document.getElementById("dateField").value = new Date().toISOString().slice(0,10);

    buildInitialRows();
  </script>
</body>
</html>
