<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OVK Luftflödesprotokoll</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root{
      --orange:#F28C28;
      --light-orange:#FFD199;
      --soft-bg:#f7f4ef;
      --text:#1f2933;
      --white:#ffffff;
      --line:#cfc7bc;
      --line-dark:#8a8177;
      --header-dark:#2b2b2b;
      --subheader:#ece7df;
      --row-alt:#faf8f5;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:20px;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--soft-bg);
      color:var(--text);
    }

    .container{
      max-width:1900px;
      margin:0 auto;
    }

    .title-panel{
      background:#fff;
      border:1px solid var(--line-dark);
      padding:18px;
      margin-bottom:18px;
    }

    .title-input{
      width:100%;
      text-align:center;
      font-size:26px;
      font-weight:700;
      padding:12px 14px;
      border:1px solid var(--line-dark);
      background:#fff;
      color:#111;
      outline:none;
    }

    .table-panel{
      background:#fff;
      border:1px solid var(--line-dark);
      overflow:auto;
    }

    table{
      width:100%;
      min-width:1550px;
      border-collapse:collapse;
      table-layout:fixed;
    }

    thead th{
      border:1px solid var(--line-dark);
      padding:10px 8px;
      text-align:center;
      font-size:14px;
    }

    thead tr.top-head th{
      background:var(--header-dark);
      color:#fff;
      font-weight:700;
      position:sticky;
      top:0;
      z-index:3;
    }

    thead tr.sub-head th{
      background:var(--subheader);
      color:#111;
      font-weight:700;
      position:sticky;
      top:41px;
      z-index:2;
    }

    tbody td{
      border:1px solid var(--line);
      padding:0;
      background:#fff;
    }

    tbody tr:nth-child(even) td{
      background:var(--row-alt);
    }

    td.apartment-cell{
      background:#f1ede7 !important;
      font-weight:700;
    }

    td.note-cell{
      background:#fcfbf9;
    }

    input.cell-input{
      width:100%;
      border:none;
      background:transparent;
      padding:10px 8px;
      font-size:14px;
      outline:none;
      min-height:40px;
    }

    input.cell-input:focus{
      background:#fff7ef;
    }

    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button{
      padding:11px 16px;
      border-radius:0;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      box-shadow:none;
    }

    .btn{
      border:1px solid var(--line-dark);
      background:#fff;
      color:#111;
    }

    .btn:hover{
      background:#f4efe8;
    }

    .btn-primary{
      border:1px solid #9b5f1e;
      background:var(--orange);
      color:#fff;
    }

    .btn-primary:hover{
      filter:brightness(0.96);
    }

    .footer-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:16px;
      margin-top:22px;
    }

    .footer-box{
      background:#fff;
      border:1px solid var(--line-dark);
      padding:16px;
    }

    .footer-box label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
      color:#111;
      text-transform:uppercase;
      letter-spacing:0.4px;
    }

    .footer-box input{
      width:100%;
      border:1px solid var(--line-dark);
      padding:10px 10px;
      font-size:14px;
      background:#fff;
      border-radius:0;
      outline:none;
    }

    .footer-box input:focus{
      background:#fff7ef;
    }

    .status-box{
      margin-top:14px;
      background:#fff;
      border:1px solid var(--line-dark);
      padding:10px 12px;
      font-size:14px;
    }

    .w-apt{ width:110px; }
    .w-sub{ width:78px; }
    .w-note{ width:240px; }

    @media (max-width: 1100px){
      .footer-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 700px){
      body{
        padding:10px;
      }
      .title-input{
        font-size:20px;
      }
      thead th{
        font-size:12px;
        padding:8px 6px;
      }
      input.cell-input{
        font-size:13px;
        padding:8px 6px;
      }
      thead tr.sub-head th{
        top:37px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="title-panel">
      <input
        id="projectTitle"
        class="title-input"
        value="Luftflödesprotokoll Brf Doktorn, Smidesvägen 17 Södertälje"
      />
    </div>

    <div class="table-panel">
      <table id="ovkTable">
        <thead>
          <tr class="top-head">
            <th class="w-apt" rowspan="2">Lägenhet</th>
            <th colspan="2">Kök</th>
            <th colspan="2">Bad</th>
            <th colspan="2">WC</th>
            <th colspan="2">Vardagsrum</th>
            <th colspan="2">Sov 1</th>
            <th colspan="2">Sov 2</th>
            <th class="w-note" rowspan="2">Notering</th>
          </tr>
          <tr class="sub-head">
            <th class="w-sub">Proj</th>
            <th class="w-sub">Uppm</th>

            <th class="w-sub">Proj</th>
            <th class="w-sub">Uppm</th>

            <th class="w-sub">Proj</th>
            <th class="w-sub">Uppm</th>

            <th class="w-sub">Proj</th>
            <th class="w-sub">Uppm</th>

            <th class="w-sub">Proj</th>
            <th class="w-sub">Uppm</th>

            <th class="w-sub">Proj</th>
            <th class="w-sub">Uppm</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="buttons">
      <button class="btn" onclick="addRow()">Lägg till rad</button>
      <button class="btn" onclick="removeRow()">Ta bort rad</button>
      <button class="btn-primary" onclick="exportPDF()">Exportera PDF</button>
    </div>

    <div class="footer-grid">
      <div class="footer-box">
        <label for="dateField">Datum</label>
        <input type="date" id="dateField" />
      </div>
      <div class="footer-box">
        <label for="methodField">Mätmetod / kalibreringsnummer</label>
        <input type="text" id="methodField" placeholder="Ange metod och kal.nr" />
      </div>
      <div class="footer-box">
        <label for="performedByField">Utfört av</label>
        <input type="text" id="performedByField" placeholder="Namn" />
      </div>
    </div>

    <div class="status-box" id="statusBox">Status: Redo</div>
  </div>

  <script>
    const roomColumns = ["Kök", "Bad", "WC", "Vardagsrum", "Sov 1", "Sov 2"];
    const tbody = document.querySelector("#ovkTable tbody");
    const statusBox = document.getElementById("statusBox");

    function makeApartmentLabel(n){
      const floor = 11 + Math.floor((n - 1) / 3);
      const door = ((n - 1) % 3) + 1;
      return `${floor}0${door}`;
    }

    function createRoomCellPair(roomKey){
      return `
        <td><input class="cell-input" data-room="${roomKey}" data-type="proj"></td>
        <td><input class="cell-input" data-room="${roomKey}" data-type="uppm"></td>
      `;
    }

    function createRow(apartmentLabel){
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td class="apartment-cell"><input class="cell-input" value="${apartmentLabel}"></td>
        ${createRoomCellPair("kok")}
        ${createRoomCellPair("bad")}
        ${createRoomCellPair("wc")}
        ${createRoomCellPair("vardagsrum")}
        ${createRoomCellPair("sov1")}
        ${createRoomCellPair("sov2")}
        <td class="note-cell"><input class="cell-input"></td>
      `;

      tbody.appendChild(tr);
    }

    function buildInitialRows(){
      tbody.innerHTML = "";
      for(let i = 1; i <= 32; i++){
        createRow(makeApartmentLabel(i));
      }
      setStatus("Grundtabell skapad.");
    }

    function addRow(){
      createRow(makeApartmentLabel(tbody.querySelectorAll("tr").length + 1));
      setStatus("Rad tillagd.");
    }

    function removeRow(){
      const rows = tbody.querySelectorAll("tr");
      if(rows.length > 1){
        rows[rows.length - 1].remove();
        setStatus("Sista raden borttagen.");
      } else {
        setStatus("Minst en rad måste finnas kvar.");
      }
    }

    function sanitizeFileName(name){
      return (name || "OVK-projekt")
        .replace(/[\\\\/:*?\"<>|]/g, "-")
        .replace(/\\s+/g, " ")
        .trim();
    }

    function setStatus(text){
      statusBox.textContent = "Status: " + text;
    }

    function exportPDF(){
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF("landscape");

      const projectTitle = document.getElementById("projectTitle").value || "Luftflödesprotokoll";
      const date = document.getElementById("dateField").value || "";
      const method = document.getElementById("methodField").value || "";
      const performedBy = document.getElementById("performedByField").value || "";

      doc.setFillColor(242, 140, 40);
      doc.rect(8, 8, 281, 12, "F");

      doc.setTextColor(255,255,255);
      doc.setFontSize(13);
      doc.text(projectTitle, 148, 16, { align: "center" });

      doc.setTextColor(20);

      const head = [
        [
          { content: "Lägenhet", rowSpan: 2 },
          { content: "Kök", colSpan: 2 },
          { content: "Bad", colSpan: 2 },
          { content: "WC", colSpan: 2 },
          { content: "Vardagsrum", colSpan: 2 },
          { content: "Sov 1", colSpan: 2 },
          { content: "Sov 2", colSpan: 2 },
          { content: "Notering", rowSpan: 2 }
        ],
        [
          "Proj","Uppm",
          "Proj","Uppm",
          "Proj","Uppm",
          "Proj","Uppm",
          "Proj","Uppm",
          "Proj","Uppm"
        ]
      ];

      const body = [];
      tbody.querySelectorAll("tr").forEach(tr => {
        const inputs = tr.querySelectorAll("input");
        const row = [];
        inputs.forEach(input => row.push(input.value || ""));
        body.push(row);
      });

      doc.autoTable({
        startY: 24,
        head: head,
        body: body,
        theme: "grid",
        styles: {
          fontSize: 7,
          cellPadding: 2,
          textColor: 20,
          lineColor: [160, 160, 160],
          lineWidth: 0.1
        },
        headStyles: {
          fillColor: [43, 43, 43],
          textColor: 255,
          fontStyle: "bold",
          halign: "center",
          valign: "middle"
        },
        alternateRowStyles: {
          fillColor: [248, 246, 243]
        },
        columnStyles: {
          0: { cellWidth: 18 },
          1: { cellWidth: 12 },
          2: { cellWidth: 12 },
          3: { cellWidth: 12 },
          4: { cellWidth: 12 },
          5: { cellWidth: 12 },
          6: { cellWidth: 12 },
          7: { cellWidth: 14 },
          8: { cellWidth: 14 },
          9: { cellWidth: 12 },
          10:{ cellWidth: 12 },
          11:{ cellWidth: 12 },
          12:{ cellWidth: 12 },
          13:{ cellWidth: 34 }
        },
        didParseCell: function(data) {
          if (data.section === 'head' && data.row.index === 1) {
            data.cell.styles.fillColor = [236, 231, 223];
            data.cell.styles.textColor = [20, 20, 20];
          }
        }
      });

      const finalY = doc.lastAutoTable.finalY + 10;

      doc.setDrawColor(120,120,120);
      doc.rect(12, finalY, 60, 18);
      doc.rect(98, finalY, 88, 18);
      doc.rect(212, finalY, 60, 18);

      doc.setFontSize(9);
      doc.text("Datum", 15, finalY + 5);
      doc.text("Mätmetod / kalibreringsnummer", 101, finalY + 5);
      doc.text("Utfört av", 215, finalY + 5);

      doc.setFontSize(10);
      doc.text(date, 15, finalY + 12);
      doc.text(method, 101, finalY + 12);
      doc.text(performedBy, 215, finalY + 12);

      doc.save(`${sanitizeFileName(projectTitle)}.pdf`);
      setStatus("PDF exporterad.");
    }

    document.getElementById("dateField").value = new Date().toISOString().slice(0,10);
    buildInitialRows();
  </script>
</body>
</html>
