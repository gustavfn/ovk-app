<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OVK Fältapp</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root{
      --orange:#F28C28;
      --light-orange:#FFD199;
      --bg:#f5f2ed;
      --panel:#ffffff;
      --line:#b8b0a6;
      --line-soft:#d8d1c8;
      --text:#20262c;
      --dark:#2f2f2f;
      --sub:#ece7df;
      --row-alt:#faf8f5;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:16px;
    }

    .app{
      max-width:1900px;
      margin:0 auto;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      padding:16px;
      margin-bottom:14px;
    }

    .hidden{
      display:none !important;
    }

    h1,h2,h3{
      margin:0 0 12px 0;
      font-weight:700;
    }

    .grid{
      display:grid;
      gap:12px;
    }

    .grid-2{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .grid-3{
      grid-template-columns:repeat(3,minmax(0,1fr));
    }

    .grid-4{
      grid-template-columns:repeat(4,minmax(0,1fr));
    }

    label{
      display:block;
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.4px;
      margin-bottom:6px;
    }

    input, select{
      width:100%;
      border:1px solid var(--line);
      padding:10px 10px;
      border-radius:0;
      background:#fff;
      font-size:14px;
      outline:none;
    }

    input:focus, select:focus{
      background:#fff8f0;
    }

    .title-input{
      font-size:22px;
      font-weight:700;
      text-align:center;
      padding:12px;
      border:1px solid var(--line);
      width:100%;
    }

    .system-buttons{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      margin-top:8px;
    }

    .sys-btn{
      border:1px solid var(--line);
      background:#fff;
      padding:14px 10px;
      font-weight:700;
      cursor:pointer;
      font-size:14px;
    }

    .sys-btn.active{
      background:var(--orange);
      color:#fff;
      border-color:#995d1b;
    }

    .executor-row{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:8px;
      margin-bottom:8px;
    }

    .small-btn, .btn, .btn-primary{
      border-radius:0;
      font-weight:700;
      cursor:pointer;
      font-size:14px;
    }

    .small-btn{
      padding:10px 12px;
      border:1px solid var(--line);
      background:#fff;
    }

    .btn{
      padding:11px 16px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
    }

    .btn-primary{
      padding:11px 16px;
      border:1px solid #995d1b;
      background:var(--orange);
      color:#fff;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }

    .title-bar{
      margin-bottom:12px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      background:#fff;
    }

    table{
      width:100%;
      min-width:1600px;
      border-collapse:collapse;
      table-layout:fixed;
    }

    thead th{
      border:1px solid var(--line);
      padding:8px 6px;
      text-align:center;
      font-size:13px;
      white-space:nowrap;
    }

    thead tr.main-head th{
      background:var(--dark);
      color:#fff;
      position:sticky;
      top:0;
      z-index:3;
    }

    thead tr.sub-head th{
      background:var(--sub);
      color:#111;
      position:sticky;
      top:37px;
      z-index:2;
    }

    tbody td{
      border:1px solid var(--line-soft);
      padding:0;
      background:#fff;
    }

    tbody tr:nth-child(even) td{
      background:var(--row-alt);
    }

    .apt-cell{
      background:#f1ede7 !important;
      font-weight:700;
    }

    .cell-input{
      width:100%;
      min-height:34px;
      border:none;
      background:transparent;
      padding:8px 6px;
      font-size:13px;
      outline:none;
      text-align:center;
    }

    .cell-input.left{
      text-align:left;
    }

    .cell-input:focus{
      background:#fff7ef;
    }

    .footer-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .footer-box{
      border:1px solid var(--line);
      background:#fff;
      padding:14px;
    }

    .status{
      margin-top:12px;
      border:1px solid var(--line);
      background:#fff;
      padding:10px 12px;
      font-size:14px;
    }

    .muted{
      color:#666;
      font-size:13px;
    }

    @media (max-width:1100px){
      .grid-4, .grid-3, .grid-2, .system-buttons, .footer-grid{
        grid-template-columns:1fr;
      }
      thead tr.sub-head th{
        top:37px;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- START PAGE -->
    <div id="startScreen" class="panel">
      <h2>Nytt protokoll</h2>

      <div class="grid grid-2">
        <div>
          <label>Projektnamn</label>
          <input id="startProjectName" placeholder="Brf Doktorn, Smidesvägen 17 Södertälje">
        </div>
        <div>
          <label>Systemtyp</label>
          <div class="system-buttons">
            <button class="sys-btn" data-system="sjalvdrag" onclick="selectSystem('självdrag', this)">Självdrag</button>
            <button class="sys-btn" data-system="franluft" onclick="selectSystem('frånluft', this)">Frånluft</button>
            <button class="sys-btn" data-system="ftx" onclick="selectSystem('ftx', this)">FTX</button>
            <button class="sys-btn" data-system="ft" onclick="selectSystem('ft', this)">FT</button>
          </div>
        </div>
      </div>

      <div style="margin-top:14px;">
        <label>Utförare</label>
        <div id="executorsList"></div>
        <div class="toolbar">
          <button class="btn" onclick="addExecutor()">Lägg till utförare</button>
        </div>
      </div>

      <div class="toolbar" style="margin-top:18px;">
        <button class="btn-primary" onclick="startProject()">Öppna mall</button>
      </div>
    </div>

    <!-- WORK PAGE -->
    <div id="workScreen" class="hidden">
      <div class="panel title-bar">
        <input id="projectTitle" class="title-input">
        <div class="muted" style="margin-top:8px;">
          System: <strong id="systemLabel"></strong> |
          Utförare: <strong id="executorsLabel"></strong>
        </div>
      </div>

      <div id="editorPanel" class="panel">
        <h3>Redigering av mall</h3>
        <div id="editorControls" class="toolbar"></div>
      </div>

      <div class="table-wrap">
        <table id="protocolTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="toolbar">
        <button class="btn" onclick="addApartmentRow()">Lägg till rad</button>
        <button class="btn" onclick="removeApartmentRow()">Ta bort rad</button>
        <button class="btn" onclick="goBack()">Tillbaka</button>
        <button class="btn-primary" onclick="exportPDF()">Klar / Exportera PDF</button>
      </div>

      <div class="footer-grid">
        <div class="footer-box">
          <label>Datum</label>
          <input type="date" id="dateField">
        </div>
        <div class="footer-box">
          <label>Mätmetod / kalibreringsnummer</label>
          <input id="methodField" placeholder="Ange metod och kal.nr">
        </div>
        <div class="footer-box">
          <label>Utfört av</label>
          <input id="performedByField" placeholder="Namn eller flera namn">
        </div>
      </div>

      <div id="statusBox" class="status">Status: Redo</div>
    </div>

  </div>

  <script>
    const state = {
      system: "",
      projectName: "",
      executors: [""],
      rows: 32,
      template: null
    };

    const templates = {
      "självdrag": {
        title: "Självdrag",
        groups: [
          { key: "kok", label: "Kök", type: "single", count: 1 },
          { key: "bad", label: "Badrum", type: "single", count: 1 },
          { key: "wc", label: "WC", type: "single", count: 1 },
          { key: "klad", label: "Klädkammare", type: "single", count: 1 },
          { key: "rum", label: "Rum", type: "single", count: 1 }
        ]
      },
      "frånluft": {
        title: "Frånluft",
        groups: [
          { key: "kok", label: "Kök", type: "double", count: 1 },
          { key: "bad", label: "Badrum", type: "double", count: 1 },
          { key: "wc", label: "WC", type: "double", count: 1 },
          { key: "klad", label: "Klädkammare", type: "double", count: 1 },
          { key: "rum", label: "Rum", type: "double", count: 1 }
        ]
      },
      "ftx": {
        title: "FTX",
        groups: [
          { key: "kok", label: "Kök", type: "double", count: 1 },
          { key: "bad", label: "Badrum", type: "double", count: 1 },
          { key: "wc", label: "WC", type: "double", count: 1 },
          { key: "klad", label: "Klädkammare", type: "double", count: 1 },
          { key: "vard", label: "Vardagsrum", type: "double", count: 1 },
          { key: "sov", label: "Sovrum", type: "double", count: 1 }
        ]
      },
      "ft": {
        title: "FT",
        groups: [
          { key: "kok", label: "Kök", type: "double", count: 1 },
          { key: "bad", label: "Badrum", type: "double", count: 1 },
          { key: "wc", label: "WC", type: "double", count: 1 },
          { key: "klad", label: "Klädkammare", type: "double", count: 1 },
          { key: "vard", label: "Vardagsrum", type: "double", count: 1 },
          { key: "sov", label: "Sovrum", type: "double", count: 1 }
        ]
      }
    };

    function cloneTemplate(obj){
      return JSON.parse(JSON.stringify(obj));
    }

    function setStatus(text){
      const el = document.getElementById("statusBox");
      if(el) el.textContent = "Status: " + text;
    }

    function addExecutor(value = ""){
      const list = document.getElementById("executorsList");
      const row = document.createElement("div");
      row.className = "executor-row";
      row.innerHTML = `
        <input value="${value}" placeholder="Namn på utförare">
        <button class="small-btn" type="button">Ta bort</button>
        <button class="small-btn" type="button">Kopiera</button>
      `;
      const inputs = row.querySelectorAll("button");
      inputs[0].onclick = () => {
        row.remove();
        if (!document.querySelectorAll("#executorsList .executor-row").length) addExecutor();
      };
      inputs[1].onclick = () => {
        addExecutor(row.querySelector("input").value);
      };
      list.appendChild(row);
    }

    function selectSystem(system, btn){
      state.system = system;
      document.querySelectorAll(".sys-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    function startProject(){
      const projectName = document.getElementById("startProjectName").value.trim();
      const executorInputs = [...document.querySelectorAll("#executorsList input")].map(i => i.value.trim()).filter(Boolean);

      if(!projectName){
        alert("Fyll i projektnamn.");
        return;
      }
      if(!state.system){
        alert("Välj systemtyp.");
        return;
      }

      state.projectName = projectName;
      state.executors = executorInputs.length ? executorInputs : [""];
      state.template = cloneTemplate(templates[state.system]);

      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("workScreen").classList.remove("hidden");
      document.getElementById("projectTitle").value = projectName;
      document.getElementById("systemLabel").textContent = state.template.title;
      document.getElementById("executorsLabel").textContent = state.executors.join(", ");
      document.getElementById("performedByField").value = state.executors.join(", ");
      document.getElementById("dateField").value = new Date().toISOString().slice(0,10);

      renderEditor();
      renderTable();
      setStatus("Projekt öppnat.");
    }

    function goBack(){
      document.getElementById("workScreen").classList.add("hidden");
      document.getElementById("startScreen").classList.remove("hidden");
      setStatus("Tillbaka till startsidan.");
    }

    function makeApartmentLabel(n){
      const floor = 11 + Math.floor((n - 1) / 3);
      const door = ((n - 1) % 3) + 1;
      return `${floor}0${door}`;
    }

    function addApartmentRow(){
      const body = document.getElementById("tableBody");
      const next = body.querySelectorAll("tr").length + 1;
      body.appendChild(buildBodyRow(next));
      setStatus("Rad tillagd.");
    }

    function removeApartmentRow(){
      const rows = document.querySelectorAll("#tableBody tr");
      if(rows.length > 1){
        rows[rows.length - 1].remove();
        setStatus("Sista raden borttagen.");
      } else {
        setStatus("Minst en rad måste finnas kvar.");
      }
    }

    function renderEditor(){
      const wrap = document.getElementById("editorControls");
      wrap.innerHTML = "";

      state.template.groups.forEach((g, index) => {
        const box = document.createElement("div");
        box.style.border = "1px solid #b8b0a6";
        box.style.padding = "10px";
        box.style.background = "#fff";
        box.innerHTML = `
          <strong>${g.label}</strong>
          <div class="muted" style="margin:6px 0 8px 0;">
            Typ: ${g.type === "double" ? "Proj/Uppm" : "Enkel"}
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="small-btn" type="button">Lägg till</button>
            <button class="small-btn" type="button">Ta bort</button>
            ${(state.system === "frånluft" || state.system === "ftx" || state.system === "ft") ? `<button class="small-btn" type="button">${g.type === "double" ? "Gör enkel" : "Gör proj/uppm"}</button>` : ""}
          </div>
        `;

        const buttons = box.querySelectorAll("button");
        buttons[0].onclick = () => {
          g.count += 1;
          renderEditor();
          renderTable();
          setStatus(`${g.label}: kolumn tillagd.`);
        };
        buttons[1].onclick = () => {
          if(g.count > 1){
            g.count -= 1;
            renderEditor();
            renderTable();
            setStatus(`${g.label}: kolumn borttagen.`);
          } else {
            setStatus(`${g.label}: minst en måste finnas kvar.`);
          }
        };
        if(buttons[2]){
          buttons[2].onclick = () => {
            g.type = g.type === "double" ? "single" : "double";
            renderEditor();
            renderTable();
            setStatus(`${g.label}: celltyp ändrad.`);
          };
        }

        wrap.appendChild(box);
      });
    }

    function renderTable(){
      renderHead();
      renderBody();
    }

    function renderHead(){
      const head = document.getElementById("tableHead");
      const hasDouble = state.template.groups.some(g => g.type === "double");

      let row1 = `<tr class="main-head"><th rowspan="${hasDouble ? 2 : 1}">Lägenhet</th>`;
      let row2 = `<tr class="sub-head">`;

      state.template.groups.forEach(g => {
        for(let i=1; i<=g.count; i++){
          const label = g.count > 1 ? `${g.label} ${i}` : g.label;
          if(g.type === "double"){
            row1 += `<th colspan="2">${label}</th>`;
            row2 += `<th>Proj</th><th>Uppm</th>`;
          } else {
            row1 += `<th rowspan="${hasDouble ? 2 : 1}">${label}</th>`;
          }
        }
      });

      row1 += `<th rowspan="${hasDouble ? 2 : 1}">Notering</th></tr>`;
      row2 += `</tr>`;

      head.innerHTML = hasDouble ? row1 + row2 : row1;
    }

    function buildBodyRow(n){
      const tr = document.createElement("tr");
      let html = `<td class="apt-cell"><input class="cell-input" value="${makeApartmentLabel(n)}"></td>`;

      state.template.groups.forEach(g => {
        for(let i=1; i<=g.count; i++){
          if(g.type === "double"){
            html += `<td><input class="cell-input" maxlength="4"></td><td><input class="cell-input" maxlength="4"></td>`;
          } else {
            html += `<td><input class="cell-input" maxlength="4"></td>`;
          }
        }
      });

      html += `<td><input class="cell-input left"></td>`;
      tr.innerHTML = html;
      return tr;
    }

    function renderBody(){
      const body = document.getElementById("tableBody");
      const count = body.querySelectorAll("tr").length || state.rows;
      body.innerHTML = "";
      for(let i=1; i<=count; i++){
        body.appendChild(buildBodyRow(i));
      }
    }

    function sanitizeFileName(name){
      return (name || "OVK-projekt")
        .replace(/[\\\\/:*?\"<>|]/g, "-")
        .replace(/\\s+/g, " ")
        .trim();
    }

    function buildPdfHead(){
      const hasDouble = state.template.groups.some(g => g.type === "double");

      if(!hasDouble){
        const row = [{ content: "Lägenhet", rowSpan: 1 }];
        state.template.groups.forEach(g => {
          for(let i=1; i<=g.count; i++){
            row.push({ content: g.count > 1 ? `${g.label} ${i}` : g.label, rowSpan: 1 });
          }
        });
        row.push({ content: "Notering", rowSpan: 1 });
        return [row];
      }

      const row1 = [{ content: "Lägenhet", rowSpan: 2 }];
      const row2 = [];

      state.template.groups.forEach(g => {
        for(let i=1; i<=g.count; i++){
          const label = g.count > 1 ? `${g.label} ${i}` : g.label;
          if(g.type === "double"){
            row1.push({ content: label, colSpan: 2 });
            row2.push("Proj", "Uppm");
          } else {
            row1.push({ content: label, rowSpan: 2 });
          }
        }
      });

      row1.push({ content: "Notering", rowSpan: 2 });

      return [row1, row2];
    }

    function exportPDF(){
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF("landscape");

      const projectTitle = document.getElementById("projectTitle").value || state.projectName || "OVK-protokoll";
      const date = document.getElementById("dateField").value || "";
      const method = document.getElementById("methodField").value || "";
      const performedBy = document.getElementById("performedByField").value || "";

      doc.setFillColor(242, 140, 40);
      doc.rect(8, 8, 281, 12, "F");

      doc.setTextColor(255,255,255);
      doc.setFontSize(13);
      doc.text(projectTitle, 148, 16, { align: "center" });

      doc.setTextColor(20);

      const body = [];
      document.querySelectorAll("#tableBody tr").forEach(tr => {
        const row = [];
        tr.querySelectorAll("input").forEach(input => row.push(input.value || ""));
        body.push(row);
      });

      doc.autoTable({
        startY: 24,
        head: buildPdfHead(),
        body: body,
        theme: "grid",
        styles: {
          fontSize: 7,
          cellPadding: 1.8,
          textColor: 20,
          lineColor: [170,170,170],
          lineWidth: 0.1,
          halign: "center",
          valign: "middle"
        },
        headStyles: {
          fillColor: [47,47,47],
          textColor: 255,
          fontStyle: "bold"
        },
        alternateRowStyles: {
          fillColor: [248,246,243]
        },
        didParseCell: function(data){
          if (data.section === 'head' && data.row.index === 1) {
            data.cell.styles.fillColor = [236, 231, 223];
            data.cell.styles.textColor = [20,20,20];
          }
        }
      });

      const finalY = Math.min(doc.lastAutoTable.finalY + 10, 180);

      doc.setDrawColor(120,120,120);
      doc.rect(12, finalY, 60, 18);
      doc.rect(98, finalY, 88, 18);
      doc.rect(212, finalY, 60, 18);

      doc.setFontSize(9);
      doc.text("Datum", 15, finalY + 5);
      doc.text("Mätmetod / kalibreringsnummer", 101, finalY + 5);
      doc.text("Utfört av", 215, finalY + 5);

      doc.setFontSize(10);
      doc.text(String(date), 15, finalY + 12);
      doc.text(String(method), 101, finalY + 12);
      doc.text(String(performedBy), 215, finalY + 12);

      doc.save(`${sanitizeFileName(projectTitle)}.pdf`);
      setStatus("PDF exporterad.");
    }

    // init
    addExecutor();
  </script>
</body>
</html>
